<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>すらたま型プロンプト（雷型探索モデル）デモ</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-top: 20px; margin-bottom: 10px; font-size: 24px; color: #58a6ff; }
        #controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        button:hover { background: #30363d; border-color: #8b949e; }
        button.active { background: #1f6feb; color: white; border-color: #1f6feb; }
        
        #description {
            width: 800px;
            height: 50px;
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #canvas-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #010409;
            border: 2px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 舞台装置のCSS */
        .cloud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, #2d333b, transparent);
            z-index: 10;
        }
        .ground {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40px;
            background: #161b22;
            border-top: 2px solid #30363d;
            z-index: 10;
        }
        .lightning-rod {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 50px;
            background: #8b949e;
            border-radius: 3px 3px 0 0;
            box-shadow: 0 0 10px rgba(139, 148, 158, 0.5);
            z-index: 11;
        }
        .rod-label {
            position: absolute;
            bottom: 15px; left: 50%;
            transform: translateX(-50%);
            font-size: 14px; color: #8b949e;
            z-index: 12;
        }

        /* 詳細解説用のCSS */
        .details-box {
            width: 770px; /* padding分を考慮 */
            margin-top: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            color: #8b949e;
            min-height: 80px;
        }
        .details-box b { color: #c9d1d9; }
    </style>
</head>
<body>

    <h1>🌩️ 雷型探索モデル (Prompting Styles)</h1>
    
    <div id="controls">
        <button onclick="playDemo('high', this)">1. 明確派 (過拘束)</button>
        <button onclick="playDemo('low', this)">2. 曖昧派 (ガチャ)</button>
        <button onclick="playDemo('co', this)">3. 一緒に走る派 (確実)</button>
    </div>

    <div id="description">ボタンを押して推論（アニメーション）を開始してください。</div>

    <div id="canvas-container">
        <div class="cloud"></div>
        <canvas id="lightningCanvas" width="800" height="500"></canvas>
        <div class="ground"></div>
        <div class="lightning-rod"></div>
        <div class="rod-label">真の目的</div>
        <!-- フラッシュエフェクト用の要素 -->
        <div id="flash" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s ease-out; z-index: 20;"></div>
    </div>

    <div id="details" class="details-box">上のボタンを押すと、ここに各プロンプティング手法の詳しい解説が表示されます。</div>

    <script>
        const canvas = document.getElementById('lightningCanvas');
        const ctx = canvas.getContext('2d');
        const desc = document.getElementById('description');
        const details = document.getElementById('details');

        // 雷を描画する関数（少しずつ伸びるアニメーション）
        function drawLightning(startX, startY, endX, endY, color, roughness, callback) {
            let currentX = startX;
            let currentY = startY;
            let steps = 25;
            let yStep = (endY - startY) / steps;
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            let i = 0;
            function animate() {
                if (i >= steps) {
                    if (callback) callback();
                    return;
                }
                currentY += yStep;
                // roughnessでジグザグ感を出す
                let shake = (Math.random() - 0.5) * roughness;
                currentX += shake;
                // 終点に徐々に近づける
                currentX += (endX - currentX) * 0.15; 
                
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
                i++;
                requestAnimationFrame(animate);
            }
            animate();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0;
        }

        // 画面をピカッと白く光らせる関数
        function doFlash() {
            const flash = document.getElementById('flash');
            flash.style.opacity = '0.8';
            setTimeout(() => { flash.style.opacity = '0'; }, 100);
        }

        function playDemo(type, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            clearCanvas();

            if (type === 'high') {
                let isLucky = Math.random() < 0.2; // 20%の確率で奇跡の成功
                if (isLucky) {
                    desc.innerHTML = "<b>【明確派：奇跡の成功】</b> パイプの出口が「偶然」避雷針にドンピシャで合っていた場合。";
                    details.innerHTML = "<b>【解説：偶然のクリティカル】</b><br>指定した厳格なルールが、たまたま今回のタスク（避雷針）に完全に適合していた場合の奇跡的な成功例です。一切の迷いなく一直線に出力されますが、この「完璧なパイプ」を毎回設計するのは至難の業です。たまに大成功してしまうため、この手法から抜け出せなくなる人が多いです。";
                    ctx.beginPath(); ctx.moveTo(400, 80); ctx.lineTo(400, 460); ctx.strokeStyle = 'rgba(100, 100, 100, 0.5)'; ctx.lineWidth = 40; ctx.stroke();
                    drawLightning(400, 80, 400, 460, '#ffffff', 2, () => { doFlash(); });
                } else {
                    desc.innerHTML = "<b>【明確派：失敗】</b> 真上から下ろしたつもりのパイプが少しズレて浮いているため、目的から逸れて強制着地。";
                    details.innerHTML = "<b>【解説：過拘束の罠】</b><br>分厚いマニュアルや厳格なフォーマットでがんじがらめに縛るスタイルです。本人は完璧に指示したつもりでも、前提条件が少しズレているだけで、AIは軌道修正ができずに「もっともらしい嘘（悪性ハルシネーション）」をついたまま強制着地してしまいます。";
                    ctx.beginPath(); ctx.moveTo(400, 80); ctx.lineTo(450, 400); ctx.strokeStyle = 'rgba(100, 100, 100, 0.5)'; ctx.lineWidth = 40; ctx.stroke();
                    drawLightning(400, 80, 460, 460, '#ff7b72', 5);
                }
            } 
            else if (type === 'low') {
                desc.innerHTML = "<b>【曖昧派：ガチャ】</b> 探索空間が広がりすぎ、結果は運任せ。何度かボタンを押してみてください。";
                details.innerHTML = "<b>【解説：丸投げとプロンプトガチャ】</b><br>「とりあえず良い感じにお願い」と丸投げするスタイルです。無数の可能性（細い雷光）がランダムな場所に落ちます。たまに運良く真の目的（避雷針）に当たることもありますが、なぜそこに落ちたのかはブラックボックスで再現性がありません。";
                
                let hitSuccess = false;
                let numLightnings = 10; // 10本の細い雷光を放つ

                for(let i = 0; i < numLightnings; i++){
                    let randomX = Math.random() * 800;
                    // 避雷針の範囲（385〜415付近）に落ちた雷があれば成功判定
                    if(randomX > 385 && randomX < 415 && !hitSuccess) {
                        hitSuccess = true;
                        // 運良く当たった雷だけ白く光らせてフラッシュ
                        drawLightning(400, 80, randomX, 460, '#ffffff', 100, () => { doFlash(); });
                    } else {
                        // 外れた雷は薄い水色で何もない地面へ
                        drawLightning(400, 80, randomX, 460, 'rgba(121, 192, 255, 0.3)', 120);
                    }
                }
            }
            else if (type === 'co') {
                desc.innerHTML = "<b>【一緒に走る派：確実】</b> 途中で誘雷針（追加プロンプト）を置き、軌道修正しながら真の目的に直撃！";
                details.innerHTML = "<b>【解説：マネジメントと対話】</b><br>AIへの指示は、部下に仕事を頼むのと同じです。最初から完璧なルールで縛るでもなく、丸投げにするでもなく、「まずは大まかな方向で走らせる」のがコツです。<br>途中で雷が止まったタイミングで<b>『そっちじゃないよ、こっちだよ』と小さな目印（追加のプロンプト・壁打ち）をポンと置いてあげる</b>ことで、無駄なく確実かつ最もクオリティの高い結果を導き出すことができます。";
                // ステップ1
                drawLightning(400, 80, 300, 200, '#a5d6ff', 30, () => {
                    ctx.fillStyle = '#f0e68c'; ctx.beginPath(); ctx.arc(300, 200, 6, 0, Math.PI*2); ctx.fill(); // 誘雷針1
                    // ステップ2
                    setTimeout(() => drawLightning(300, 200, 450, 350, '#a5d6ff', 30, () => {
                        ctx.fillStyle = '#f0e68c'; ctx.beginPath(); ctx.arc(450, 350, 6, 0, Math.PI*2); ctx.fill(); // 誘雷針2
                        // ステップ3（避雷針へ直撃）
                        setTimeout(() => drawLightning(450, 350, 400, 460, '#ffffff', 20, () => { doFlash(); }), 500);
                    }), 500);
                });
            }
        }
    </script>
</body>
</html>
